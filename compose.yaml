---
services:
  postgresql:
    image: postgres:18
    container_name: wineapp-postgresql
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: /run/secrets/postgres_password
    ports:
      - 5432:5432
    networks:
      - wineapp-network
    volumes:
      - postgresql-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: wineapp-pgadmin
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: user@mail.com
      PGADMIN_DEFAULT_PASSWORD: /run/secrets/pgadmin_password
    networks:
      - wineapp-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/misc/ping"]
      interval: 10s
      retries: 5

  mlflow:
    build:
      context: ./
      dockerfile: wine_mlflow/Dockerfile
    image: wineapp-mlflow
    container_name: wineapp-mlflow
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - 5000:5000
    networks:
      - wineapp-network
    restart: on-failure
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000
    volumes:
      - ./wine_mlflow/mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      retries: 5

  wine_api:
    build:
      context: ./wine_api
      dockerfile: Dockerfile
    image: winapp-api
    container_name: winapp-api
    volumes:
      - ./wine_api/wine_api:/wine_api/wine_api
    depends_on:
      postgresql:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    ports:
      - 8000:8000
    networks:
      - wineapp-network
    restart: on-failure
    environment:
      - MLFLOW_HOST=mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      retries: 5

  wine_ds:
    build:
      context: ./wine_ds
      dockerfile: Dockerfile
    image: winapp-datascience
    container_name: winapp-datascience
    volumes:
      - ./wine_ds/wine_ds:/wine_ds/wine_ds
    networks:
      - wineapp-network
    environment:
      - MLFLOW_HOST=mlflow
      - POSTGRESQL_HOST=postgresql
      - API_HOST=wine_api

networks:
  wineapp-network:
    driver: bridge

volumes:
  pgadmin-data:
  postgresql-data:

secrets:
  pgadmin_password:
    file: ./infra/secrets/pgadmin_password.txt
  postgres_password:
    file: ./infra/secrets/postgres_password.txt
