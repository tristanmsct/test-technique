---
exclude: |
  (?x)^(
    \.venv/|
    infra/|
    doc/
  )
exclude_types: []

repos:
  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-toml
      - id: debug-statements

  # Lockfile
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.9
    hooks:
      - id: uv-lock
        name: Generate clean uv.lock (wine_ds)
        files: ^wine_ds/
        args: [--project, wine_ds]
      - id: uv-lock
        name: Generate clean uv.lock (wine_api)
        files: ^wine_api/
        args: [--project, wine_api]

  # Format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  # Dockerfile
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

  # Type check
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uvx ty check
        args: ["wine_api/", "wine_ds/"]
        language: python
        pass_filenames: false

  # Security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "wine_api", "wine_ds"]
        additional_dependencies: ["bandit[toml]"]
